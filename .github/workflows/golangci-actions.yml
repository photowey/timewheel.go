name: Timewheel.go CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  build:
    name: ubuntu-latest - Go from go.mod
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download
        env:
          GOPROXY: "https://proxy.golang.org,direct"

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check code formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not formatted:"
            echo "$files"
            exit 1
          fi

      - name: Run tests
        run: go test -shuffle=on -coverprofile=coverage.out ./...

      - name: Run race tests
        run: go test -race -shuffle=on ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run executable examples
        run: |
          go run ./examples/basic
          go run ./examples/cancel
          go run ./examples/custom_pools
          go run ./examples/backpressure
          go run ./examples/metrics

      - name: Run benchmark smoke test
        run: go test -run '^$' -bench='BenchmarkSchedule' -benchmem -benchtime=100ms -count=1 ./pkg/timewheel
